name: Rust build and test
on:
  push:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always
  CLICOLOR_FORCE: 1

jobs:
  build:
    name: Build, test, and check project
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - run: rustup toolchain install stable --profile minimal
    - uses: Swatinem/rust-cache@v2
    - name: Build
      run: cargo build
    - name: Check syntax
      run: cargo fmt -- --check
    - name: Run tests
      run: cargo test
  publish:
    needs: build
    name: Publish for ${{ matrix.binary_target }}
    runs-on: ${{ matrix.os }}
    if: ${{ ! startsWith(github.ref, 'refs/tags/') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            binary_target: x86_64-unknown-linux-gnu
          - os: windows-latest
            binary_target: x86_64-pc-windows-msvc
          # - os: macos-latest
          #   binary_target: x86_64-apple-darwin
          - os: macos-latest
            binary_target: aarch64-apple-darwin
    steps:
    - uses: actions/checkout@v3
    - run: rustup toolchain install stable --profile minimal
    - uses: Swatinem/rust-cache@v2
    - name: Update rust
      run: |
        rustup override set stable
        rustup update stable
        rustup target add ${{ matrix.binary_target }}
    - name: Build Binary
      uses: actions-rs/cargo@v1
      with:
        use-cross: true
        command: build
        args: --verbose --release --target ${{ matrix.binary_target }}
    - name: Get the release version from the tag
      shell: bash
      run: echo VERSION=`awk -F ' = ' '$1 ~ /version/ { gsub(/[\"]/, "", $2); printf("%s",$2) }' Cargo.toml` >> $GITHUB_ENV
    - name: Build archive
      shell: bash
      run: |
        # Replace with the name of your binary
        binary_name="advent-rs"
    
        dirname="$binary_name-${{ env.VERSION }}-${{ matrix.binary_target }}"
        mkdir "$dirname"
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          mv "target/${{ matrix.binary_target }}/release/$binary_name.exe" "$dirname"
        else
          mv "target/${{ matrix.binary_target }}/release/$binary_name" "$dirname"
        fi
    
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          7z a "$dirname.zip" "$dirname"
          echo "ASSET=$dirname.zip" >> $GITHUB_ENV
        else
          tar -czf "$dirname.tar.gz" "$dirname"
          echo "ASSET=$dirname.tar.gz" >> $GITHUB_ENV
        fi
    - name: Upload the binaries
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ${{ env.ASSET }}
